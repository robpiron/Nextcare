<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&display=swap');
body{width:400px;height:400px;overflow:hidden;font-family:Outfit,sans-serif}
.wrap{
  width:400px;height:400px;
  background:linear-gradient(145deg,#0f172a 0%,#1e3a8a 60%,#2563eb 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;position:relative;
}
/* Dot grid */
.wrap::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.07) 1px,transparent 1px);
  background-size:20px 20px;
}
/* Glow */
.wrap::after{
  content:'';position:absolute;
  width:260px;height:260px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,.25),transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.logo-box{
  width:140px;height:140px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  border-radius:32px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 20px 60px rgba(37,99,235,.6),0 0 0 1px rgba(255,255,255,.1);
  position:relative;z-index:1;
}
.logo-text{
  font-family:Outfit,sans-serif;font-weight:900;
  font-size:3.8rem;color:#fff;letter-spacing:-3px;
  line-height:1;
}
.brand{position:relative;z-index:1;text-align:center}
.brand-name{
  font-family:Outfit,sans-serif;font-weight:900;
  font-size:1.7rem;color:#fff;letter-spacing:-.5px;line-height:1.1;
}
.brand-sub{
  font-size:.72rem;color:rgba(255,255,255,.55);
  letter-spacing:2px;text-transform:uppercase;margin-top:4px;
  font-weight:600;
}
.badge{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:5px 14px;
  font-size:.68rem;font-weight:700;color:rgba(255,255,255,.7);
  letter-spacing:.5px;position:relative;z-index:1;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-box">
    <span class="logo-text">NC</span>
  </div>
  <div class="brand">
    <div class="brand-name">NextCare</div>
    <div class="brand-sub">Healthcare Operating System</div>
  </div>
  <div class="badge">nextcare.tech</div>
</div>
</body>
</html>
