<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&display=swap');
body{width:400px;height:400px;overflow:hidden;font-family:Outfit,sans-serif}
.wrap{
  width:400px;height:400px;
  background:#f4f6fa;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;position:relative;
}
/* Dot grid sottile */
.wrap::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(37,99,235,.08) 1px,transparent 1px);
  background-size:20px 20px;
}
/* Cerchio decorativo dietro logo */
.glow{
  position:absolute;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,235,.1),transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-70%);
}
.logo-box{
  width:140px;height:140px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  border-radius:32px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 16px 48px rgba(37,99,235,.3),0 0 0 6px rgba(37,99,235,.08);
  position:relative;z-index:1;
}
.logo-text{
  font-family:Outfit,sans-serif;font-weight:900;
  font-size:3.8rem;color:#fff;letter-spacing:-3px;line-height:1;
}
.brand{position:relative;z-index:1;text-align:center}
.brand-name{
  font-family:Outfit,sans-serif;font-weight:900;
  font-size:1.7rem;color:#1e293b;letter-spacing:-.5px;line-height:1.1;
}
.brand-sub{
  font-size:.7rem;color:#64748b;
  letter-spacing:2px;text-transform:uppercase;margin-top:4px;font-weight:600;
}
.badge{
  background:#eff6ff;border:1px solid #bfdbfe;
  border-radius:20px;padding:5px 14px;
  font-size:.68rem;font-weight:700;color:#2563eb;
  letter-spacing:.5px;position:relative;z-index:1;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="glow"></div>
  <div class="logo-box">
    <span class="logo-text">NC</span>
  </div>
  <div class="brand">
    <div class="brand-name">NextCare</div>
    <div class="brand-sub">Healthcare Operating System</div>
  </div>
  <div class="badge">nextcare.tech</div>
</div>
</body>
</html>
